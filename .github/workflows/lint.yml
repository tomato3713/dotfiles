name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run shellcheck
        run: |
          echo "::add-matcher::.github/shellcheck-matcher.json"
          find . -name "*.sh" -exec shellcheck --format=gcc --severity=error {} +
