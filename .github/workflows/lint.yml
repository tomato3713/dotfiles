name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run shellcheck
        run: |
          echo "::add-matcher::.github/shellcheck-matcher.json"
          find . -name "*.sh" -exec shellcheck --format=gcc --severity=error {} +

  selene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install selene
        env:
          SELENE_VERSION: "0.30.1"
        run: |
          curl -sL https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip -o selene.zip
          unzip selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/
      - name: Download Neovim type definitions
        run: curl -sO https://raw.githubusercontent.com/NTBBloodbath/nvim-types/main/nvim.toml && mv nvim.toml vim.toml
      - name: Run selene
        run: selene nvim/
